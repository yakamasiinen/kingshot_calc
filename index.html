<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kingshot部隊計算機</title>
    <style>
        body { font-family: sans-serif; background-color: #f5f5f5; display: flex; justify-content: center; padding: 20px; }
        .calc-card { background-color: #f0f0f0; padding: 30px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); width: 100%; max-width: 480px; }
        .input-row { display: flex; align-items: center; margin-bottom: 12px; }
        .label { background-color: #999; color: white; width: 120px; padding: 10px; text-align: center; font-weight: bold; margin-right: 10px; border-radius: 2px; font-size: 14px; }
        .label-blue { background-color: #5b8bd0; }
        .label-dark { background-color: #666; }
        input { border: 1px solid #ccc; padding: 10px; font-size: 18px; width: 140px; border-radius: 2px; flex-grow: 1; }
        .unit { margin-left: 10px; font-size: 16px; color: #555; width: 40px; }
        
        /* 注釈のスタイル */
        .note { font-size: 11px; color: #666; margin-top: -8px; margin-bottom: 12px; margin-left: 130px; }

        /* プリセットボタンのスタイル */
        .preset-group { display: flex; justify-content: space-between; margin: 15px 0 25px 0; gap: 10px; }
        .btn-preset { background-color: #fff; border: 1px solid #bbb; padding: 10px; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: bold; flex: 1; box-shadow: 0 2px 0 #ccc; }
        .btn-preset:active { transform: translateY(2px); box-shadow: none; }

        .button-group { margin-top: 25px; display: flex; gap: 10px; }
        .btn-calc { background-color: #5b8bd0; color: white; border: none; padding: 12px; border-radius: 4px; font-size: 18px; cursor: pointer; box-shadow: 0 3px 0 #3d66a4; flex: 2; }
        .btn-clear { background-color: #fff; color: #666; border: 1px solid #ccc; padding: 12px; border-radius: 4px; font-size: 18px; cursor: pointer; box-shadow: 0 3px 0 #ddd; flex: 1; }
        .result-area { margin-top: 20px; border-top: 2px solid #ddd; padding-top: 20px; }
        .result-row { display: flex; align-items: center; margin-bottom: 10px; font-size: 20px; font-weight: bold; color: #333; }
        .result-label { width: 100px; color: #666; font-size: 16px; }
    </style>
</head>
<body>

        <div class="label">合計</div>
        <input type="number" id="total" value="55000">
    </div>

        <div class="label label-blue">集結主</div>
        <input type="number" id="minus" value="5000">

    <div class="input-row">
        <div class="label">集結人数</div>
        <input type="number" id="divisor" value="10">
        <span class="unit">人</span>
    </div>
