<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kingshot部隊計算機(Ver.2.5)</title>
    <style>
        body { font-family: sans-serif; background-color: #f5f5f5; display: flex; justify-content: center; padding: 20px; }
        .calc-card { background-color: #f0f0f0; padding: 30px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); width: 100%; max-width: 480px; }
        .input-row { display: flex; align-items: center; margin-bottom: 12px; }
        .label { background-color: #999; color: white; width: 120px; padding: 10px; text-align: center; font-weight: bold; margin-right: 10px; border-radius: 2px; font-size: 14px; }
        .label-blue { background-color: #5b8bd0; }
        .label-dark { background-color: #666; }
        input { border: 1px solid #ccc; padding: 10px; font-size: 18px; width: 140px; border-radius: 2px; flex-grow: 1; }
        .unit { margin-left: 10px; font-size: 16px; color: #555; width: 40px; }
        
        .note { font-size: 11px; color: #5b8bd0; margin: -8px 0 12px 130px; font-weight: bold; }

        .preset-section-label { font-size: 12px; color: #666; margin-bottom: 5px; font-weight: bold; }
        .preset-group { display: flex; flex-wrap: wrap; justify-content: space-between; margin: 5px 0 15px 0; gap: 8px; }
        .btn-preset { background-color: #fff; border: 1px solid #bbb; padding: 8px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: bold; flex: 1; min-width: 100px; box-shadow: 0 2px 0 #ccc; }
        .btn-preset:active { transform: translateY(2px); box-shadow: none; }
        .btn-host { border-color: #5b8bd0; color: #3d66a4; }

        .button-group { margin-top: 25px; display: flex; gap: 10px; }
        .btn-calc { background-color: #5b8bd0; color: white; border: none; padding: 12px; border-radius: 4px; font-size: 18px; cursor: pointer; box-shadow: 0 3px 0 #3d66a4; flex: 2; }
        .btn-clear { background-color: #fff; color: #666; border: 1px solid #ccc; padding: 12px; border-radius: 4px; font-size: 18px; cursor: pointer; box-shadow: 0 3px 0 #ddd; flex: 1; }
        
        .result-area { margin-top: 20px; border-top: 2px solid #ddd; padding-top: 20px; }
        .result-row { display: flex; align-items: center; margin-bottom: 10px; font-size: 20px; font-weight: bold; color: #333; }
        .result-label { width: 100px; color: #666; font-size: 16px; }
        .result-total { color: #5b8bd0; border-top: 1px dashed #ccc; margin-top: 10px; padding-top: 10px; }
    </style>
</head>
<body>

<div class="calc-card">
    <div class="preset-section-label">👤 集結主を選択（人数15で自動入力）</div>
    <div class="preset-group">
        <button class="btn-preset btn-host" onclick="setHost(1061271, 150000, 15)">らるど</button>
        <button class="btn-preset btn-host" onclick="setHost(10022020, 150000, 15)">ゔぇるひめ</button>
        <button class="btn-preset btn-host" onclick="setHost(1030120, 150000, 15)">たけなん</button>
        <button class="btn-preset btn-host" onclick="setHost(1086100, 150000, 15)">はげまんと</button>
    </div>

    <div class="input-row">
        <div class="label">合計兵数</div>
        <input type="number" id="total" value="100000">
    </div>

    <div class="input-row">
        <div class="label label-blue">集結主兵数</div>
        <input type="number" id="minus" value="1000000">
    </div>

    <div class="input-row">
        <div class="label">現在の人数</div>
        <input type="number" id="divisor" value="15">
        <span class="unit">人</span>
    </div>
    <div class="note">※集結主を含めた人数を入力</div>

    <div class="preset-section-label">📊 作戦を選択</div>
    <div class="preset-group">
        <button class="btn-preset" onclick="setRatios(60, 20, 20)">🛡️ 防衛</button>
        <button class="btn-preset" onclick="setRatios(50, 20, 30)">⚔️ 攻撃</button>
        <button class="btn-preset" onclick="setRatios(10, 20, 70)">🐾 熊罠</button>
    </div>

    <div class="input-row">
        <div class="label label-dark">歩兵 割合</div>
        <input type="number" id="ratioA" value="45">
        <span class="unit">%</span>
    </div>

    <div class="input-row">
        <div class="label label-dark">騎兵 割合</div>
        <input type="number" id="ratioB" value="20">
        <span class="unit">%</span>
    </div>

    <div class="input-row">
        <div class="label label-dark">弓兵 割合</div>
        <input type="number" id="ratioC" value="35">
        <span class="unit">%</span>
    </div>

    <div class="button-group">
        <button class="btn-calc" onclick="runCalc()">✔ 計算実行</button>
        <button class="btn-clear" onclick="clearFields()">✖ クリア</button>
    </div>

    <div id="result" class="result-area" style="display:none;">
        <div class="result-row"><span class="result-label">歩兵：</span><span id="outA"></span></div>
        <div class="result-row"><span class="result-label">騎兵：</span><span id="outB"></span></div>
        <div class="result-row"><span class="result-label">弓兵：</span><span id="outC"></span></div>
        <div class="result-row result-total"><span class="result-label">派遣合計：</span><span id="outTotal"></span></div>
    </div>
</div>

<script>
    // 集結人数(div)もセットできるように拡張
    function setHost(total, minus, div) {
        document.getElementById('total').value = total;
        document.getElementById('minus').value = minus;
        document.getElementById('divisor').value = div;
        runCalc();
    }

    function setRatios(a, b, c) {
        document.getElementById('ratioA').value = a;
        document.getElementById('ratioB').value = b;
        document.getElementById('ratioC').value = c;
        runCalc(); 
    }

    function runCalc() {
        const raVal = parseFloat(document.getElementById('ratioA').value) || 0;
        const rbVal = parseFloat(document.getElementById('ratioB').value) || 0;
        const rcVal = parseFloat(document.getElementById('ratioC').value) || 0;

        const totalRatio = raVal + rbVal + rcVal;
        if (totalRatio !== 100) {
            if(totalRatio !== 0) alert("エラー：割合の合計が " + totalRatio + "% です。\n合計を100%にしてください。");
            document.getElementById('result').style.display = 'none';
            return;
        }

        const t = parseFloat(document.getElementById('total').value) || 0;
        const m = parseFloat(document.getElementById('minus').value) || 0;
        const rawDivisor = parseFloat(document.getElementById('divisor').value) || 2;
        const d = (rawDivisor - 1) > 0 ? (rawDivisor - 1) : 1; 

        const ra = raVal / 100;
        const rb = rbVal / 100;
        const rc = rcVal / 100;

        const base = (t - m) / d;
        
        const valA = Math.ceil(base * ra);
        const valB = Math.ceil(base * rb);
        const valC = Math.ceil(base * rc);
        const sumAll = valA + valB + valC;

        document.getElementById('outA').innerText = valA.toLocaleString() + " 人";
        document.getElementById('outB').innerText = valB.toLocaleString() + " 人";
        document.getElementById('outC').innerText = valC.toLocaleString() + " 人";
        document.getElementById('outTotal').innerText = sumAll.toLocaleString() + " 人";
        
        document.getElementById('result').style.display = 'block';
    }

    function clearFields() {
        ['total', 'minus', 'divisor', 'ratioA', 'ratioB', 'ratioC'].forEach(id => {
            document.getElementById(id).value = "";
        });
        document.getElementById('result').style.display = 'none';
    }
</script>

</body>
</html>
